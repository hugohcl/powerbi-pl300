name: Auto-merge Claude branches

on:
  push:
    branches: ['claude/**']

permissions:
  contents: write
  pull-requests: write

jobs:
  create-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR and merge
        run: |
          # Create PR (ignore error if already exists)
          gh pr create --repo "$GH_REPO" --base master --head "$GITHUB_REF_NAME" \
            --title "Auto-merge: $GITHUB_REF_NAME" \
            --body "Auto-created from push to $GITHUB_REF_NAME" 2>/dev/null || true

          # Wait for PR to be ready
          sleep 3

          # Merge the PR
          gh pr merge "$GITHUB_REF_NAME" --repo "$GH_REPO" --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
