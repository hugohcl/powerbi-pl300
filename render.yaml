services:
  - type: web
    name: pbi-pl300
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /opt/render/project/data/sync.db
    disk:
      name: pbi-data
      mountPath: /opt/render/project/data
      sizeGB: 1
